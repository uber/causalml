name: Test build from source install

on:
  push:
    paths:
      - 'envs/*.yml'
      - '.github/workflows/test-build-from-source.yml'

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }}${{ matrix.extra }}-py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash -l {0}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12"]
        extra: ['', 'tf', 'jax']
        include:
          - python-version: "3.11"
            python-version-nd: 311
          - python-version: "3.12"
            python-version-nd: 312
          - extra: 'tf'
            extra-pip: ',tf'
            pytest-flag: '--runtf'
          - extra: 'jax'
            extra-pip: ',jax'
            pytest-flag: '--runjax'

    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Display Python version
        run: python -c "import sys; print(sys.version)"

      - name: create environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: causalml${{ matrix.extra }}-py${{ matrix.python-version-nd }} 
          python-version: ${{ matrix.python-version }}
          channels: defaults

      - name: install cxx-compiler 
        run: |
          conda install -c conda-forge cxx-compiler
          conda install python-graphviz
          conda install -c conda-forge xorg-libxrender
          conda install -c conda-forge libxcrypt

      - name: echo conda config
        run: |
          conda info
          conda list
          conda config --show-sources
          conda config --show  

      - name: Build
        run: |
            pip install -U pip
            pip install -U setuptools
            python -m pip install -e ".[test${{ matrix.extra-pip }}]"

      - name: Test with pytest
        run: pytest -vs tests/ ${{ matrix.pytest-flag }} --cov causalml/

      - name: echo conda env
        run: |
          conda env export


